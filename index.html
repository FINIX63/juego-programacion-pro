<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego PRO</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.contenedor{
margin:20px auto;
padding:20px;
width:90%;
max-width:700px;
background:rgba(0,0,0,0.6);
border-radius:15px;
}

button{
padding:12px;
margin:8px;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
cursor:pointer;
}

button:hover{background:#0072ff}

.oculto{display:none}

#pantallaFinal{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:30px;
z-index:999;
}
</style>
</head>

<body>

<h1>🎮 Aprende Programación PRO</h1>

<div id="login" class="contenedor">
<input id="nombre" placeholder="Nombre"><br>
<input id="correo" placeholder="Correo"><br>
<button onclick="registrar()">Entrar</button>
</div>

<div id="especialidad" class="contenedor oculto">
<h2>Elige especialidad</h2>
<button onclick="elegir('ciber')">🛡 Ciberseguridad</button>
<button onclick="elegir('web')">🌐 Web</button>
<button onclick="elegir('bd')">🗄 Base de Datos</button>
</div>

<div id="juego" class="contenedor oculto">
<p id="info"></p>
<p id="vidas"></p>

<h2 id="pregunta"></h2>
<div id="opciones"></div>

<button onclick="anterior()">⬅ Anterior</button>
<button onclick="reiniciar()">🔄 Reiniciar</button>
</div>

<div id="pantallaFinal" class="oculto">
<h1 id="mensajeFinal"></h1>
<button onclick="reiniciar()">Volver a jugar</button>
</div>

<script>

// ===== VARIABLES =====
let usuario, campo;
let vidas=3,xp=0,nivel=0,preguntaIndex=0;
let preguntas=[];

// ===== LOGIN =====
function registrar(){
usuario={
nombre:nombre.value,
correo:correo.value
};

if(!usuario.nombre||!usuario.correo) return alert("Llena datos");

let data=JSON.parse(localStorage.getItem("users"))||{};
if(data[usuario.correo]){
// cargar progreso
let u=data[usuario.correo];
nivel=u.nivel;
xp=u.xp;
campo=u.campo;
}
login.classList.add("oculto");
especialidad.classList.remove("oculto");
}

// ===== ESPECIALIDAD =====
function elegir(c){
campo=c;
especialidad.classList.add("oculto");
juego.classList.remove("oculto");

generarNivel();
actualizar();
}

// ===== GENERAR PREGUNTAS =====
function generarNivel(){
preguntas=[];

let base=[
["¿Qué es una variable?",["Guardar datos","Bucle","Error","Evento"],0],
["¿Qué es un if?",["Condición","Bucle","HTML","Error"],0],
["¿Qué es HTML?",["Estructura","BD","Servidor","Error"],0],
["¿Qué hace CSS?",["Diseño","BD","Error","Loop"],0],
["¿Qué es JS?",["Lenguaje","Color","Imagen","Nada"],0]
];

// genera 10 preguntas mezcladas
for(let i=0;i<10;i++){
let b=base[Math.floor(Math.random()*base.length)];
preguntas.push({
p:b[0]+" (Nivel "+(nivel+1)+")",
o:[...b[1]],
c:b[2]
});
}

preguntaIndex=0;
}

// ===== MEZCLA =====
function mezclar(p){
let arr=p.o.map((t,i)=>({t,ok:i===p.c}));
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()* (i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

// ===== UI =====
function actualizar(){
info.innerText=`Nivel ${nivel+1} | XP ${xp}`;
vidas.innerText="❤️".repeat(vidas);

let p=preguntas[preguntaIndex];
pregunta.innerText=p.p;

opciones.innerHTML="";
mezclar(p).forEach(o=>{
let b=document.createElement("button");
b.innerText=o.t;
b.onclick=()=>responder(o.ok);
opciones.appendChild(b);
});
}

// ===== RESPUESTA =====
function responder(ok){
if(ok){
xp+=5;
preguntaIndex++;

if(preguntaIndex>=preguntas.length){
nivel++;
if(nivel>=10){
final("🏆 GANASTE TODO");
return;
}
generarNivel();
}
}else{
vidas--;
if(vidas<=0){
final("💀 GAME OVER");
return;
}
}

guardar();
actualizar();
}

// ===== ANTERIOR =====
function anterior(){
if(preguntaIndex>0){
preguntaIndex--;
actualizar();
}
}

// ===== GUARDAR =====
function guardar(){
let data=JSON.parse(localStorage.getItem("users"))||{};
data[usuario.correo]={
nivel,xp,campo
};
localStorage.setItem("users",JSON.stringify(data));
}

// ===== FINAL =====
function final(msg){
mensajeFinal.innerText=msg;
pantallaFinal.classList.remove("oculto");
}

// ===== RESET =====
function reiniciar(){
vidas=3;
xp=0;
nivel=0;
pantallaFinal.classList.add("oculto");
generarNivel();
actualizar();
}

</script>

</body>
</html>
